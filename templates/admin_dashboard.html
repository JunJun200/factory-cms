<!DOCTYPE html>
<html>
<head>
    <title>后台管理 - {{ config_val('company_name') }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">{{ config_val('company_name') }} - 后台管理</a>
            <div class="d-flex">
                <a href="{{ url_for('index') }}" class="btn btn-outline-light me-2" target="_blank">查看网站</a>
                <a href="{{ url_for('admin_logout') }}" class="btn btn-danger">退出登录</a>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">产品管理</h4>
                        <a href="{{ url_for('add_product') }}" class="btn btn-light btn-sm"><i class="fas fa-plus"></i> 新增产品</a>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>图片</th>
                                    <th>中文名称</th>
                                    <th>英文名称</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for product in products %}
                                <tr>
                                    <td>{{ product.id }}</td>
                                    <td><img src="{{ url_for('static', filename=product.image_path) }}" height="50"></td>
                                    <td>{{ product.name_zh }}</td>
                                    <td>{{ product.name_en }}</td>
                                    <td>
                                        <a href="{{ url_for('edit_product', product_id=product.id) }}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i> 编辑</a>
                                        <a href="{{ url_for('delete_product', product_id=product.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确认删除该产品吗？')"><i class="fas fa-trash"></i> 删除</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">网站配置（中英文文案）</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('update_config') }}">
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th>配置项</th>
                                        <th>中文内容</th>
                                        <th>英文内容</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for config in configs %}
                                    <tr>
                                        <td>{{ config.key }}</td>
                                        <td><input type="text" class="form-control" name="zh_{{ config.key }}" value="{{ config.value_zh }}"></td>
                                        <td><input type="text" class="form-control" name="en_{{ config.key }}" value="{{ config.value_en }}"></td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> 保存全部修改</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
