<!DOCTYPE html>
<html>
<head>
    <title>编辑分类 - {{ config_val('company_name') }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <div class="container py-5">
        <div class="card shadow-sm" style="max-width: 600px; margin: auto;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">编辑分类</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">中文名称</label>
                        <input type="text" class="form-control" name="name_zh" value="{{ category.name_zh }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">英文名称</label>
                        <input type="text" class="form-control" name="name_en" value="{{ category.name_en }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">排序</label>
                        <input type="number" class="form-control" name="sort_order" value="{{ category.sort_order }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分类图片 (不选则不修改)</label>
                        <input type="file" class="form-control" name="image" accept="image/*">
                        {% if category.image_path %}
                            <div class="mt-2">当前图片：<img src="{{ url_for('static', filename=category.image_path) }}" height="50"></div>
                        {% endif %}
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-success">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
